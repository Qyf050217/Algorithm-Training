name: Generate Algorithm Heatmap

on:
  schedule:
    # 每天北京时间早上 8:00 (UTC 0:00) 自动运行
    - cron: '0 0 * * *' 
  workflow_dispatch: # 允许你在 GitHub 网页上随时手动点击运行测试

# 赋予 GitHub Actions 推送代码的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取主分支代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖库 (根据你的 Python 脚本引入的库)
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib seaborn

      - name: 运行脚本生成热力图
        run: |
          # 运行你 Scripts 文件夹下的 Python 代码
          python Scripts/heatmap.py

      - name: 强制推送到 output 孤儿分支
        run: |
          # 1. 创建一个干净的临时文件夹
          mkdir -p deploy
          
          # 2. 把刚生成的 ac_heatmap.png 挪进去
          cp ac_heatmap.png deploy/
          cd deploy
          
          # 3. 在临时文件夹里初始化一个全新、没有历史的 Git
          git init
          git branch -M output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 4. 提交这张图片
          git add ac_heatmap.png
          git commit -m "Auto-update ac_heatmap.png"
          
          # 5. 强行覆盖推送到云端的 output 分支
          git push --force "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" output